<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Forms</title>
</head>
<body>
    <h2>HTML Forms Real Example</h2>

    <form action="">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" required>
        <br><br>
        <label for="email">Email</label>
        <input type="email" name="email" id="email" required>
        <br><br>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" required>
        <br><br>
        <label>Gender:</label>
        <input type="radio" name="gender" id="" value="male"> Male
        <input type="radio" name="gender" id="" value="female"> Female
        <br><br>
        <label>Skills:</label>
        <input type="checkbox" name="skills" id="" value="html"> HTML
        <input type="checkbox" name="skills" id="" value="css"> CSS
        <input type="checkbox" name="skills" id="" value="javascript"> JavaScript
        <br><br>
        <textarea name="message" id="" placeholder="Your message"></textarea>
        <br><br>
        <button type="submit">Submit</button>
    </form>
    
</body>
</html>
