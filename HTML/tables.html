<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Tables</title>
  </head>
  <body>
    <h2>Student Table</h2>

    <table border="1">
      <tr>
        <th>Name</th>
        <th>Age</th>
        <th>Grade</th>
      </tr>

      <tr>
        <td>John</td>
        <td>15</td>
        <td>A</td>
      </tr>

      <tr>
        <td>Mary</td>
        <td>14</td>
        <td>B</td>
      </tr>
    </table>
  </body>
</html>
