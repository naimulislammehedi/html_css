<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Lists</title>
</head>
<body>
    <!-- Ordered List -->
     <ol>
        <li>Wake up</li>
        <li>Eat breakfast</li>
        <li>Study HTML</li>
     </ol>

     <!-- Unordered List -->
      <ul>
        <li>Apple</li>
        <li>Mango</li>
        <li>Orange</li>
      </ul>

      <!-- Description List -->
       <dl>
        <dt>HTML</dt>
        <dd>Used to create webpage structe.</dd>
        <dt>CSS</dt>
        <dd>Used for styling webpage.</dd>
       </dl>


       <!-- Nested List -->
        <strong>Web Development</strong>
        <ul>
            <li>Frontend</li>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>
            <li>Backend</li>
            <li>Fullstack</li>
        </ul>
</body>
</html>
